openapi: 3.0.3
info:
  title: Petstore
  version: 1.0.0
  description: Standard petstore fixture for CLI integration tests.
servers:
  - url: https://petstore.example.com/v1
security:
  - ApiKeyAuth: []
paths:
  /pets:
    get:
      operationId: listPets
      summary: List pets
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          description: Maximum number of pets to return
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: A paged array of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      operationId: createPet
      summary: Create a pet
      tags:
        - pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetInput'
      responses:
        '201':
          description: The created pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /pets/{petId}:
    get:
      operationId: getPetById
      summary: Get a pet by ID
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: The requested pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
    delete:
      operationId: deletePet
      summary: Delete a pet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Pet deleted
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
        - status
      properties:
        id:
          type: integer
        name:
          type: string
        tag:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/PetStatus'
    PetInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        tag:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/PetStatus'
    PetStatus:
      type: string
      enum:
        - available
        - pending
        - sold
